name: Build & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  NEXT_PUBLIC_API_URL: https://api.terminus.ink
  NEXT_PUBLIC_SUPABASE_URL: https://fxlpelewdkugkthcvazi.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_zve6Ro59kiEyS0oWK7TmdQ_qoATOaXm

jobs:
  build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: OpenNext Build (Cloudflare)
        run: npx @opennextjs/cloudflare build

      - name: Verify output
        run: test -f .open-next/worker.js && test -d .open-next/assets

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
